openapi: 3.0.3
info:
  title: 我的数字老师 - 后端接口
  version: 0.1.0
  description: |
    由当前 uni-app 前端项目整理出的"需要/预留"的后端接口规格。
    可直接导入 Swagger / Apifox / Postman。
servers:
  - url: /api

tags:
  - name: Auth
  - name: Accounts
  - name: Chat
  - name: Upload
  - name: Voice
  - name: ASR
  - name: Avatar

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    ApiResponse:
      type: object
      properties:
        ok:
          type: boolean
        code:
          type: integer
          example: 0
        message:
          type: string
          example: "ok"
        data:
          nullable: true

    RegisterRequest:
      type: object
      required: [name, account, password]
      properties:
        name:
          type: string
          example: 小明
        account:
          type: string
          example: test@example.com
        phone:
          type: string
          nullable: true
          example: "13800000000"
        password:
          type: string
          format: password
          example: "123456"

    RegisterResponseData:
      type: object
      properties:
        userId:
          type: string
          example: u_123

    LoginRequest:
      type: object
      required: [account, password]
      properties:
        account:
          type: string
          example: test@example.com
        password:
          type: string
          format: password
          example: "123456"

    LoginResponseData:
      type: object
      properties:
        accessToken:
          type: string
          example: <jwt_or_any_token>
        expiresIn:
          type: integer
          example: 7200
        user:
          type: object
          properties:
            id:
              type: string
              example: u_123
            name:
              type: string
              example: 小明
            account:
              type: string
              example: test@example.com

    MeResponseData:
      type: object
      properties:
        id:
          type: string
          example: u_123
        name:
          type: string
          example: 张三
        account:
          type: string
          example: 1008611

    AccountItem:
      type: object
      properties:
        id:
          type: string
          example: a1
        name:
          type: string
          example: 小朋友
        account:
          type: string
          example: 1008611

    AccountsListResponseData:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/AccountItem'

    AccountsCreateRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          example: "新账号名"

    AccountsSwitchRequest:
      type: object
      required: [accountId]
      properties:
        accountId:
          type: string
          example: a1

    AccountsSwitchResponseData:
      type: object
      properties:
        activeAccountId:
          type: string
          example: a1

    RecommendationItem:
      type: object
      properties:
        id:
          type: string
        text:
          type: string

    RecommendationsResponseData:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/RecommendationItem'

    ChatAttachment:
      type: object
      required: [type, url]
      properties:
        type:
          type: string
          enum: [image, file]
        url:
          type: string

    ChatRequest:
      type: object
      required: [text]
      properties:
        text:
          type: string
        attachments:
          type: array
          items:
            $ref: '#/components/schemas/ChatAttachment'
        meta:
          type: object
          additionalProperties: true

    ChatResponseData:
      type: object
      properties:
        answer:
          type: string
        conversationId:
          type: string
        messageId:
          type: string

    UploadResponseData:
      type: object
      properties:
        url:
          type: string
        mime:
          type: string
        size:
          type: integer

    AsrRequest:
      type: object
      properties:
        audioUrl:
          type: string
          description: 建议先用上传接口拿到音频 url
        format:
          type: string
          example: m4a
        sampleRate:
          type: integer
          example: 16000

    AsrResponseData:
      type: object
      properties:
        text:
          type: string
        durationMs:
          type: integer

    AvatarProfile:
      type: object
      properties:
        age:
          type: integer
          minimum: 3
          maximum: 12
        interests:
          type: array
          items:
            type: string
        style:
          type: string
        freeText:
          type: string

    AvatarVoice:
      type: object
      properties:
        presetId:
          type: string
        note:
          type: string

    AvatarOutput:
      type: object
      properties:
        characterStyle:
          type: string

    AvatarGenerateRequest:
      type: object
      required: [portraitUrl, profile, voice]
      properties:
        portraitUrl:
          type: string
          description: 头像原图 URL（必须为 /files/...）
        profile:
          $ref: '#/components/schemas/AvatarProfile'
        voice:
          $ref: '#/components/schemas/AvatarVoice'
        output:
          $ref: '#/components/schemas/AvatarOutput'

    AvatarGenerateResponseData:
      type: object
      properties:
        avatarId:
          type: string
        imageUrl:
          type: string
        url:
          type: string
        scope:
          type: string
          enum: [account, user]

    AvatarActiveResponseData:
      type: object
      properties:
        avatarId:
          type: string
        imageUrl:
          type: string
        portraitUrl:
          type: string
        profile:
          $ref: '#/components/schemas/AvatarProfile'
        voice:
          $ref: '#/components/schemas/AvatarVoice'
        createdAt:
          type: integer
        scope:
          type: string
          enum: [account, user]

    AvatarVideoGenerateRequest:
      type: object
      properties:
        imageUrl:
          type: string
          description: 头像图片 URL（/files/..）
        introText:
          type: string
          description: 自我介绍文本（用于生成声音描述）
        prompt:
          type: string
          description: 视频提示词
        resolution:
          type: string
          enum: [720P, 1080P]
        duration:
          type: integer
          description: 秒数（建议 10~15）
        shotType:
          type: string
          description: 多镜头类型（multi 等）

    AvatarVideoGenerateResponseData:
      type: object
      properties:
        jobId:
          type: string
        audioUrl:
          type: string

    AvatarVideoStatusResponseData:
      type: object
      properties:
        jobId:
          type: string
        status:
          type: string
        videoUrl:
          type: string
        scope:
          type: string
          enum: [account, user]

paths:
  /auth/register:
    post:
      tags: [Auth]
      summary: 注册
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/RegisterResponseData'

  /auth/login:
    post:
      tags: [Auth]
      summary: 登录
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/LoginResponseData'

  /auth/me:
    get:
      tags: [Auth]
      summary: 获取当前用户信息
      security:
        - bearerAuth: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/MeResponseData'

  /accounts:
    get:
      tags: [Accounts]
      summary: 获取账号列表
      security:
        - bearerAuth: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/AccountsListResponseData'
    post:
      tags: [Accounts]
      summary: 创建账号
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AccountsCreateRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/AccountItem'

  /accounts/{accountId}/delete:
    post:
      tags: [Accounts]
      summary: 删除账号
      security:
        - bearerAuth: []
      parameters:
        - name: accountId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        type: object

  /accounts/switch:
    post:
      tags: [Accounts]
      summary: 切换当前账号
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AccountsSwitchRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/AccountsSwitchResponseData'

  /recommendations:
    get:
      tags: [Chat]
      summary: 推荐问题
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/RecommendationsResponseData'

  /chat:
    post:
      tags: [Chat]
      summary: 发送对话
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChatRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/ChatResponseData'

  /upload/image:
    post:
      tags: [Upload]
      summary: 上传图片（聊天附件）
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/UploadResponseData'

  /upload/file:
    post:
      tags: [Upload]
      summary: 上传文件（聊天附件）
      security:
        - bearerAuth: []

  /upload/voice:
    post:
      tags: [Upload]
      summary: Upload voice recording
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'

  /voice/chat:
    post:
      tags: [Voice]
      summary: Voice understanding chat (ASR)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [voiceUrl]
              properties:
                voiceUrl:
                  type: string
                  example: /files/voice/xxx.aac
                conversationId:
                  type: string
                  nullable: true
                meta:
                  type: object
                  additionalProperties: true
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/UploadResponseData'

  /asr:
    post:
      tags: [ASR]
      summary: 语音识别（语音转文字）
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AsrRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/AsrResponseData'

  /avatar/upload:
    post:
      tags: [Avatar]
      summary: 上传头像照片（数字人采集）
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/UploadResponseData'

  /avatar/generate:
    post:
      tags: [Avatar]
      summary: 生成数字人头像
      security:
        - bearerAuth: []
      parameters:
        - name: scope
          in: query
          required: false
          description: 头像绑定范围（account=子账号；user=用户全局）
          schema:
            type: string
            enum: [account, user]
            default: account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AvatarGenerateRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/AvatarGenerateResponseData'

  /avatar/active:
    get:
      tags: [Avatar]
      summary: 获取当前头像
      security:
        - bearerAuth: []
      parameters:
        - name: scope
          in: query
          required: false
          description: 头像绑定范围（account=子账号；user=用户全局）
          schema:
            type: string
            enum: [account, user]
            default: account
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/AvatarActiveResponseData'

  /avatar/video/generate:
    post:
      tags: [Avatar]
      summary: 生成头像视频（Wan2.6-I2V-Flash）
      security:
        - bearerAuth: []
      parameters:
        - name: scope
          in: query
          required: false
          description: 头像绑定范围（account=子账号；user=用户全局）
          schema:
            type: string
            enum: [account, user]
            default: account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AvatarVideoGenerateRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/AvatarVideoGenerateResponseData'

  /avatar/video/status:
    get:
      tags: [Avatar]
      summary: 查询头像视频生成状态
      security:
        - bearerAuth: []
      parameters:
        - name: jobId
          in: query
          required: true
          schema:
            type: string
        - name: scope
          in: query
          required: false
          description: 头像绑定范围（account=子账号；user=用户全局）
          schema:
            type: string
            enum: [account, user]
            default: account
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/AvatarVideoStatusResponseData'